name: monitoring

networks:
  monitoring:
    driver: bridge

volumes:
  zabbix_db:
    name: compose_zabbix_db
    external: true
  prometheus_data:
  grafana_data:

services:
  # --- Zabbix ---
  zabbix-db:
    image: postgres:16-alpine
    restart: unless-stopped
    networks: [monitoring]
    environment:
      - POSTGRES_DB=zabbix
      - POSTGRES_USER=zabbix
      - POSTGRES_PASSWORD=zabbix_pass
    volumes:
      - zabbix_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zabbix -d zabbix"]
      interval: 10s
      timeout: 5s
      retries: 5

  zabbix-server:
    image: zabbix/zabbix-server-pgsql:alpine-latest
    restart: unless-stopped
    networks: [monitoring]
    depends_on:
      zabbix-db:
        condition: service_healthy
    environment:
      - DB_SERVER_HOST=zabbix-db
      - POSTGRES_DB=zabbix
      - POSTGRES_USER=zabbix
      - POSTGRES_PASSWORD=zabbix_pass
      - ZBX_STARTPOLLERS=5
    ports:
      - '10051:10051'

  zabbix-web:
    image: zabbix/zabbix-web-nginx-pgsql:alpine-latest
    restart: unless-stopped
    networks: [monitoring]
    depends_on:
      - zabbix-server
    environment:
      - DB_SERVER_HOST=zabbix-db
      - POSTGRES_DB=zabbix
      - POSTGRES_USER=zabbix
      - POSTGRES_PASSWORD=zabbix_pass
      - ZBX_SERVER_HOST=zabbix-server
      - PHP_TZ=America/Sao_Paulo
    ports:
      - '8082:8080'

  zabbix-agent:
    image: zabbix/zabbix-agent2:alpine-latest
    restart: unless-stopped
    networks: [monitoring]
    depends_on:
      - zabbix-server
    environment:
      - ZBX_SERVER_HOST=zabbix-server
      - ZBX_HOSTNAME=docker-host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    privileged: true

  # --- Prometheus stack ---
  node-exporter:
    image: quay.io/prometheus/node-exporter:latest
    restart: unless-stopped
    networks: [monitoring]
    command:
      - --path.rootfs=/host
    pid: host
    volumes:
      - /:/host:ro,rslave
    security_opt: ["no-new-privileges:true"]
    read_only: true

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    restart: unless-stopped
    networks: [monitoring]
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    security_opt: ["no-new-privileges:true"]
    read_only: true

  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    networks: [monitoring]
    volumes:
      - prometheus_data:/prometheus
      - /home/docker/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
      - --web.enable-lifecycle
    ports:
      - '9090:9090'
    security_opt: ["no-new-privileges:true"]
    read_only: true

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    networks: [monitoring]
    depends_on:
      - prometheus
    ports:
      - '3001:3000'
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: 12C@racteres
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - /home/docker/monitoring/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
    security_opt: ["no-new-privileges:true"]

  pve-exporter:
    image: prompve/prometheus-pve-exporter:latest
    restart: unless-stopped
    networks: [monitoring]
    volumes:
      - /home/docker/monitoring/pve.yml:/etc/pve.yml:ro
